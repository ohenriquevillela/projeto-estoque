version: '3.8'
services:
  db:
    image: postgres
    environment:
      POSTGRES_DB: estoque
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  backend:
    build: ./estoque-api
    ports:
      - "8086:8081"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/estoque

  frontend:
    build: ./estoque-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
